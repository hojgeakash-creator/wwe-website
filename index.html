<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronics Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Electronics Hub</h1>
    <p>Shop Premium Electronic Products</p>
</header>

<div class="container">

    <div id="brandPage">

        <h2>Select a Brand</h2>

        <div class="brand-grid">

            <div class="brand-card" onclick="showProducts('Apple')">
                Apple
            </div>

            <div class="brand-card" onclick="showProducts('Samsung')">
                Samsung
            </div>

            <div class="brand-card" onclick="showProducts('Sony')">
                Sony
            </div>

            <div class="brand-card" onclick="showProducts('Dell')">
                Dell
            </div>

            <div class="brand-card" onclick="showProducts('HP')">
                HP
            </div>

            <div class="brand-card" onclick="showProducts('Lenovo')">
                Lenovo
            </div>

        </div>

    </div>

    <div id="productPage" class="hidden">

        <button class="back-btn" onclick="goBack()">
            ← Back
        </button>

        <h2 id="brandTitle"></h2>

        <div id="productContainer"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
